name: Check Style

on: push

jobs:
  check-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@4
      - name: Set up Python
        uses: actions/setup-python@2
        with:
          python-version: 3.11.3
      - name: Install tools
        run: python -m pip install --upgrade pip pycodestyle
      - name: Check Style
        run: pycodestyle --first *.py